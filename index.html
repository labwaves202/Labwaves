<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Labwaves</title>

<style>
html,body{
margin:0;
height:100%;
background:#fff;
overflow:hidden;
}

canvas{
display:block;
}

.title{
position:fixed;
top:18px;
left:50%;
transform:translateX(-50%);
font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
font-style:italic;
font-weight:700;
letter-spacing:0.12em;
color:#000;
font-size:clamp(22px,4vw,34px);
pointer-events:none;
background:rgba(255,255,255,0.85);
padding:6px 10px;
border-radius:10px;
}
</style>
</head>

<body>
<div class="title">Labwaves</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W,H,cols,rows,cellW,cellH;
let fontPx=16;

let u,uPrev,uNext;

// wave parameters
let damping=0.03;
let c2=0.09;
let impulseStrength=0.9;
let impulseRadius=1;

// ASCII palette (dark → strong)
const palette=" .:-=+*#%@";

// random ripple timing
function nextInterval(){ return 1500+Math.random()*500 }
let timer=0;
let interval=nextInterval();

function resize(){

W=canvas.width=window.innerWidth;
H=canvas.height=window.innerHeight;

fontPx=Math.min(window.innerWidth,window.innerHeight)<700?13:16;

ctx.font=fontPx+"px monospace";
ctx.textBaseline="top";

cellH=Math.round(fontPx*1.18);
cellW=Math.round(fontPx*0.62);

cols=Math.floor(W/cellW);
rows=Math.floor(H/cellH);

u=new Float32Array(cols*rows);
uPrev=new Float32Array(cols*rows);
uNext=new Float32Array(cols*rows);

}

window.addEventListener("resize",resize);
resize();

function impulse(x,y){

for(let dy=-impulseRadius;dy<=impulseRadius;dy++){
for(let dx=-impulseRadius;dx<=impulseRadius;dx++){

let xx=x+dx;
let yy=y+dy;

if(xx<=0||xx>=cols-1||yy<=0||yy>=rows-1) continue;

let d2=dx*dx+dy*dy;
let w=Math.exp(-d2/1.6);

u[yy*cols+xx]+=impulseStrength*w;

}
}

}

function randomRipple(){

let x=Math.floor(cols*(0.25+Math.random()*0.5));
let y=Math.floor(rows*(0.25+Math.random()*0.6));

impulse(x,y);

}

canvas.addEventListener("pointerdown",e=>{

let x=Math.floor(e.clientX/cellW);
let y=Math.floor(e.clientY/cellH);

impulse(x,y);

},{passive:true});

function step(){

for(let y=0;y<rows;y++){
for(let x=0;x<cols;x++){

let i=y*cols+x;

if(x===0||x===cols-1||y===0||y===rows-1){
uNext[i]=0;
continue;
}

let center=u[i];

let lap=
u[i-cols]+
u[i+cols]+
u[i-1]+
u[i+1]-
4*center;

uNext[i]=
(2-damping)*center-
(1-damping)*uPrev[i]+
c2*lap;

}
}

let tmp=uPrev;
uPrev=u;
u=uNext;
uNext=tmp;

}

function render(){

ctx.fillStyle="#fff";
ctx.fillRect(0,0,W,H);

ctx.fillStyle="#000";

for(let y=0;y<rows;y++){
let yPix=y*cellH;

for(let x=0;x<cols;x++){

let i=y*cols+x;

let lap=0;

if(x>0&&x<cols-1&&y>0&&y<rows-1){

let center=u[i];

lap=
u[i-cols]+
u[i+cols]+
u[i-1]+
u[i+1]-
4*center;

}

let v=Math.abs(lap)*3; // amplification

let idx=Math.min(palette.length-1,Math.floor(v));

let ch=palette[idx];

ctx.fillText(ch,x*cellW,yPix);

}

}

}

let last=performance.now();

function loop(t){

let dt=Math.min(50,t-last);
last=t;

timer+=dt;

if(timer>interval){

timer=0;
interval=nextInterval();

randomRipple();

}

let substeps=Math.max(1,Math.floor(dt/18));

for(let i=0;i<substeps;i++) step();

render();

requestAnimationFrame(loop);

}

requestAnimationFrame(loop);
</script>

</body>
</html>
