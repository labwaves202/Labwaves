<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LABWAVES</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at center, #0a0a0f 0%, #000 70%);
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .container {
      display: flex;
      align-items: center;
      gap: 60px;
      max-width: 1000px;
      padding: 40px;
    }

    img {
      width: 220px;
      height: auto;
      filter: drop-shadow(0 0 25px rgba(0, 255, 200, 0.4));
      animation: pulse 4s ease-in-out infinite;
    }

    h1 {
      font-weight: 300;
      letter-spacing: 0.08em;
      font-size: clamp(22px, 3vw, 32px);
      margin: 0;
      text-transform: lowercase;
      animation: glow 3s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.04); }
      100% { transform: scale(1); }
    }

    @keyframes glow {
      from {
        text-shadow:
          0 0 5px rgba(0,255,200,0.4),
          0 0 10px rgba(0,255,200,0.3),
          0 0 20px rgba(0,255,200,0.2);
      }
      to {
        text-shadow:
          0 0 10px rgba(0,255,200,0.7),
          0 0 20px rgba(0,255,200,0.5),
          0 0 40px rgba(0,255,200,0.4);
      }
    }

    @media (max-width: 800px) {
      .container {
        flex-direction: column;
        text-align: center;
        gap: 40px;
      }

      img {
        width: 180px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <img src="assets/labwaves.png" alt="LABWAVES Logo">
    <h1>willkommen zu labwaves. coming soon...</h1>
  </div>
</body>
</html>
