<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LABWAVES</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; }
    canvas { display:block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W=0,H=0, cols=0, rows=0, cellW=0, cellH=0;
let fontPx = 16;

// Two banners: wide (desktop) + compact (mobile)
const bannerWide = [
  "тЦИтЦИтХЧ      тЦИтЦИтЦИтЦИтЦИтХЧ тЦИтЦИтЦИтЦИтЦИтЦИтХЧ тЦИтЦИтХЧ    тЦИтЦИтХЧ тЦИтЦИтЦИтЦИтЦИтХЧ тЦИтЦИтХЧ   тЦИтЦИтХЧтЦИтЦИтЦИтЦИтЦИтЦИтЦИтХЧтЦИтЦИтЦИтЦИтЦИтЦИтЦИтХЧ",
  "тЦИтЦИтХС     тЦИтЦИтХФтХРтХРтЦИтЦИтХЧтЦИтЦИтХФтХРтХРтЦИтЦИтХЧтЦИтЦИтХС    тЦИтЦИтХСтЦИтЦИтХФтХРтХРтЦИтЦИтХЧтЦИтЦИтХС   тЦИтЦИтХСтЦИтЦИтХФтХРтХРтХРтХРтХЭтЦИтЦИтХФтХРтХРтХРтХРтХЭ",
  "тЦИтЦИтХС     тЦИтЦИтЦИтЦИтЦИтЦИтЦИтХСтЦИтЦИтЦИтЦИтЦИтЦИтХФтХЭтЦИтЦИтХС тЦИтХЧ тЦИтЦИтХСтЦИтЦИтЦИтЦИтЦИтЦИтЦИтХСтЦИтЦИтХС   тЦИтЦИтХСтЦИтЦИтЦИтЦИтЦИтХЧ  тЦИтЦИтЦИтЦИтЦИтЦИтЦИтХЧ",
  "тЦИтЦИтХС     тЦИтЦИтХФтХРтХРтЦИтЦИтХСтЦИтЦИтХФтХРтХРтЦИтЦИтХЧтЦИтЦИтХСтЦИтЦИтЦИтХЧтЦИтЦИтХСтЦИтЦИтХФтХРтХРтЦИтЦИтХСтХЪтЦИтЦИтХЧ тЦИтЦИтХФтХЭтЦИтЦИтХФтХРтХРтХЭ  тХЪтХРтХРтХРтХРтЦИтЦИтХС",
  "тЦИтЦИтЦИтЦИтЦИтЦИтЦИтХЧтЦИтЦИтХС  тЦИтЦИтХСтЦИтЦИтЦИтЦИтЦИтЦИтХФтХЭтХЪтЦИтЦИтЦИтХФтЦИтЦИтЦИтХФтХЭтЦИтЦИтХС  тЦИтЦИтХС тХЪтЦИтЦИтЦИтЦИтХФтХЭ тЦИтЦИтЦИтЦИтЦИтЦИтЦИтХЧтЦИтЦИтЦИтЦИтЦИтЦИтЦИтХС",
  "тХЪтХРтХРтХРтХРтХРтХРтХЭтХЪтХРтХЭ  тХЪтХРтХЭтХЪтХРтХРтХРтХРтХРтХЭ  тХЪтХРтХРтХЭтХЪтХРтХРтХЭ тХЪтХРтХЭ  тХЪтХРтХЭ  тХЪтХРтХРтХРтХЭ  тХЪтХРтХРтХРтХРтХРтХРтХЭтХЪтХРтХРтХРтХРтХРтХРтХЭ",
];

const bannerCompact = [
  " _      ___  ___ _      __   __ ___ ___ ",
  "| |    / _ \\| _ \\ |     \\ \\ / /| _ \\ __|",
  "| |__ | (_) |  _/ |__    \\ V / |  _/ _| ",
  "|____| \\___/|_| |____|    |_|  |_| |___|",
];

let bannerLines = bannerWide;
let bannerRows = bannerLines.length + 1;

// Wave buffers for area below banner
let u=null, uPrev=null, uNext=null;

// Physics (small ripples)
let damping = 0.10;       // quick decay
let c2 = 0.045;           // limited spread
let impulseStrength = 0.32;
let impulseRadius = 0;    // single cell
let lapThr = 0.18;

// Colors
const bg = "#000";
const bannerColor = "#fff";
const waveColor = "#00ffc8";

// Interaction / scheduling
let lastMouseStamp = 0;
const MOUSE_COOLDOWN_MS = 70;  // sparse impulses on mousemove
let lastCellX = -999, lastCellY = -999;

let rngTimer = 0;
let rngIntervalMs = 380; // random ripple cadence (mobile-friendly)

// Decide тАЬmobile-ishтАЭ
function isSmallScreen() {
  return Math.min(window.innerWidth, window.innerHeight) < 700;
}

function configureForScreen() {
  const small = isSmallScreen();

  // On small screens: slightly smaller font so banner fits + lower workload
  fontPx = small ? 12 : 16;

  bannerLines = small ? bannerCompact : bannerWide;

  // Reduce simulation load on small screens (fewer ripples + stronger damping)
  damping = small ? 0.12 : 0.10;
  c2 = small ? 0.040 : 0.045;
  impulseStrength = small ? 0.26 : 0.32;
  lapThr = small ? 0.20 : 0.18;
  rngIntervalMs = small ? 520 : 380;
}

function resize(){
  configureForScreen();

  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  ctx.font = `${fontPx}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
  ctx.textBaseline = "top";

  cellH = Math.round(fontPx * 1.18);
  cellW = Math.round(fontPx * 0.62);

  cols = Math.max(10, Math.floor(W / cellW));
  rows = Math.max(10, Math.floor(H / cellH));

  bannerRows = Math.min(rows - 2, bannerLines.length + 1);
  const simRows = Math.max(1, rows - bannerRows);

  u = new Float32Array(cols * simRows);
  uPrev = new Float32Array(cols * simRows);
  uNext = new Float32Array(cols * simRows);
}
window.addEventListener("resize", resize);
resize();

function addImpulseAtCell(x, ySim){
  const simRows = rows - bannerRows;
  if (x <= 0 || x >= cols-1 || ySim <= 0 || ySim >= simRows-1) return;

  u[ySim*cols + x] += impulseStrength;
}

function pointerToCell(clientX, clientY){
  const x = Math.floor(clientX / cellW);
  const yAll = Math.floor(clientY / cellH);
  if (yAll < bannerRows) return null;
  const ySim = yAll - bannerRows;
  const simRows = rows - bannerRows;
  if (x < 0 || x >= cols || ySim < 0 || ySim >= simRows) return null;
  return {x, ySim};
}

// Desktop: mousemove impulses (sparse)
canvas.addEventListener("mousemove", (e) => {
  if (isSmallScreen()) return;
  const now = performance.now();
  if (now - lastMouseStamp < MOUSE_COOLDOWN_MS) return;
  lastMouseStamp = now;

  const cell = pointerToCell(e.clientX, e.clientY);
  if (!cell) return;

  if (cell.x === lastCellX && cell.ySim === lastCellY) return;
  lastCellX = cell.x; lastCellY = cell.ySim;

  addImpulseAtCell(cell.x, cell.ySim);
}, {passive:true});

// Mobile + Desktop: tap/click adds a ripple (works everywhere)
canvas.addEventListener("pointerdown", (e) => {
  const cell = pointerToCell(e.clientX, e.clientY);
  if (!cell) return;
  addImpulseAtCell(cell.x, cell.ySim);
}, {passive:true});

// Random gentle ripples (works for mobile, also adds life on desktop)
function addRandomRipple(){
  const simRows = rows - bannerRows;
  if (simRows <= 2) return;

  // Bias slightly towards center so it looks intentional
  const x = Math.floor(cols * (0.25 + Math.random()*0.5));
  const y = Math.floor(simRows * (0.20 + Math.random()*0.75));

  addImpulseAtCell(x, y);
}

// Wave equation step
function stepSim(){
  const simRows = rows - bannerRows;
  if (simRows <= 0) return;

  for (let y=0; y<simRows; y++){
    for (let x=0; x<cols; x++){
      const i = y*cols + x;

      // fixed boundary
      if (x===0 || x===cols-1 || y===0 || y===simRows-1){
        uNext[i] = 0;
        continue;
      }

      const center = u[i];
      const lap = (u[i-cols] + u[i+cols] + u[i-1] + u[i+1] - 4*center);

      uNext[i] =
        (2 - damping) * center -
        (1 - damping) * uPrev[i] +
        c2 * lap;
    }
  }

  const tmp = uPrev; uPrev = u; u = uNext; uNext = tmp;
}

function render(){
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Banner centered; if still too wide, we simply start at 0 (no cutoff shift)
  ctx.fillStyle = bannerColor;
  const maxLen = bannerLines.reduce((m,l)=>Math.max(m,l.length),0);
  const startX = Math.max(0, Math.floor((cols - maxLen) / 2));

  for (let i=0; i<Math.min(bannerLines.length, bannerRows-1); i++){
    ctx.fillText(bannerLines[i], startX * cellW, i * cellH);
  }

  // Waves by curvature (thin fronts)
  ctx.fillStyle = waveColor;
  const simRows = rows - bannerRows;

  for (let y=0; y<simRows; y++){
    const yPix = (y + bannerRows) * cellH;
    for (let x=0; x<cols; x++){
      const i = y*cols + x;

      let lap = 0;
      if (x>0 && x<cols-1 && y>0 && y<simRows-1){
        const center = u[i];
        lap = (u[i-cols] + u[i+cols] + u[i-1] + u[i+1] - 4*center);
      }

      const ch = (Math.abs(lap) > lapThr) ? "-" : "~";
      ctx.fillText(ch, x * cellW, yPix);
    }
  }

  // Minimal label (works on mobile too)
  ctx.fillStyle = "rgba(255,255,255,0.55)";
  const hint = isSmallScreen() ? "tap to ripple" : "move / tap to ripple";
  ctx.fillText(hint, 2 * cellW, (bannerRows - 1) * cellH);
}

let last = performance.now();
function loop(t){
  const dt = Math.min(50, t - last);
  last = t;

  // Random ripple timer
  rngTimer += dt;
  if (rngTimer >= rngIntervalMs) {
    rngTimer = 0;
    addRandomRipple();
  }

  // Substeps (lower on mobile)
  const substeps = Math.max(1, Math.floor(dt / (isSmallScreen() ? 26 : 22)));
  for (let i=0; i<substeps; i++) stepSim();

  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
