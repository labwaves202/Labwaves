<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LABWAVES</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; cursor:crosshair; }
    canvas { display:block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W=0,H=0, cols=0, rows=0, cellW=0, cellH=0;
const fontPx = 16;

// Banner
const bannerLines = [
  "‚Ėą‚Ėą‚ēó      ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó    ‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó",
  "‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ    ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēź‚ēź‚ēĚ",
  "‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ ‚Ėą‚ēó ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó  ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó",
  "‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēĎ‚ēö‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚Ėą‚Ėą‚ēĎ",
  "‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚ēö‚Ėą‚Ėą‚Ėą‚ēĒ‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĎ",
  "‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ",
];
let bannerRows = bannerLines.length + 1;

// Wave sim buffers (only below banner)
let u=null, uPrev=null, uNext=null;

// Tuned for: small, local ripples
let damping = 0.060;        // stronger damping => ripples die quickly
let c2 = 0.055;             // slower propagation => less spread
let impulseStrength = 0.55; // smaller impulse amplitude
let impulseRadius = 1;      // 1 => very local (3x3 area)

// Visuals
const bg = "#000000";
const bannerColor = "#ffffff";
const waveColor = "#00ffc8";
const thr = 0.14;           // threshold for '-' vs '~' (slightly sensitive)

// Mouse tracking + throttle
let lastStamp = 0;
let lastCellX = -999, lastCellY = -999;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  ctx.font = `${fontPx}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
  ctx.textBaseline = "top";

  cellH = Math.round(fontPx * 1.15);
  cellW = Math.round(fontPx * 0.62);

  cols = Math.max(10, Math.floor(W / cellW));
  rows = Math.max(10, Math.floor(H / cellH));

  bannerRows = Math.min(rows - 2, bannerLines.length + 1);
  const simRows = Math.max(1, rows - bannerRows);

  u = new Float32Array(cols * simRows);
  uPrev = new Float32Array(cols * simRows);
  uNext = new Float32Array(cols * simRows);
}
window.addEventListener("resize", resize);
resize();

function addImpulseAtCell(x, ySim){
  const simRows = rows - bannerRows;
  if (x <= 0 || x >= cols-1 || ySim <= 0 || ySim >= simRows-1) return;

  const r = impulseRadius;
  for (let dy=-r; dy<=r; dy++){
    for (let dx=-r; dx<=r; dx++){
      const xx = x + dx;
      const yy = ySim + dy;
      if (xx < 1 || xx >= cols-1 || yy < 1 || yy >= simRows-1) continue;
      const d2 = dx*dx + dy*dy;
      const w = Math.exp(-d2 / 1.2); // tight gaussian
      u[yy*cols + xx] += impulseStrength * w;
    }
  }
}

// Mouse-over -> small impulse (throttled + only when cell changes)
canvas.addEventListener("mousemove", (e) => {
  const now = performance.now();
  if (now - lastStamp < 22) return; // ~45 impulses/sec max
  lastStamp = now;

  const x = Math.floor(e.clientX / cellW);
  const yAll = Math.floor(e.clientY / cellH);
  if (yAll < bannerRows) return;

  const ySim = yAll - bannerRows;
  if (x === lastCellX && ySim === lastCellY) return; // only when entering a new cell
  lastCellX = x; lastCellY = ySim;

  addImpulseAtCell(x, ySim);
});

function stepSim(){
  const simRows = rows - bannerRows;
  if (simRows <= 0) return;

  for (let y=0; y<simRows; y++){
    for (let x=0; x<cols; x++){
      const i = y*cols + x;

      // fixed boundary
      if (x===0 || x===cols-1 || y===0 || y===simRows-1){
        uNext[i] = 0;
        continue;
      }

      const center = u[i];
      const lap = (u[i-cols] + u[i+cols] + u[i-1] + u[i+1] - 4*center);

      uNext[i] =
        (2 - damping) * center -
        (1 - damping) * uPrev[i] +
        c2 * lap;
    }
  }

  const tmp = uPrev;
  uPrev = u;
  u = uNext;
  uNext = tmp;
}

function render(){
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // banner
  ctx.fillStyle = bannerColor;
  const startX = Math.max(0, Math.floor((cols - bannerLines[0].length) / 2));
  for (let i=0; i<Math.min(bannerLines.length, bannerRows-1); i++){
    ctx.fillText(bannerLines[i], startX * cellW, i * cellH);
  }

  // waves
  ctx.fillStyle = waveColor;
  const simRows = rows - bannerRows;
  for (let y=0; y<simRows; y++){
    const yPix = (y + bannerRows) * cellH;
    for (let x=0; x<cols; x++){
      const val = u[y*cols + x];
      const ch = (Math.abs(val) > thr) ? "-" : "~";
      ctx.fillText(ch, x * cellW, yPix);
    }
  }
}

let last = performance.now();
function loop(t){
  const dt = Math.min(50, t - last);
  last = t;

  // fewer substeps to keep it calmer
  const substeps = Math.max(1, Math.floor(dt / 20));
  for (let i=0; i<substeps; i++) stepSim();

  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
