<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LABWAVES</title>
  <style>
    html, body { margin:0; height:100%; background:#000; overflow:hidden; cursor:crosshair; }
    canvas { display:block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

let W=0,H=0, cols=0, rows=0, cellW=0, cellH=0;
const fontPx = 16;

// Banner
const bannerLines = [
  "в–Ҳв–Ҳв•—      в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—    в–Ҳв–Ҳв•— в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•— в–Ҳв–Ҳв•—   в–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—",
  "в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘    в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв•җв•җв•қв–Ҳв–Ҳв•”в•җв•җв•җв•җв•қ",
  "в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘ в–Ҳв•— в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•‘   в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—  в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—",
  "в–Ҳв–Ҳв•‘     в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘в–Ҳв–Ҳв•”в•җв•җв–Ҳв–Ҳв•‘в•ҡв–Ҳв–Ҳв•— в–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•”в•җв•җв•қ  в•ҡв•җв•җв•җв•җв–Ҳв–Ҳв•‘",
  "в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қв•ҡв–Ҳв–Ҳв–Ҳв•”в–Ҳв–Ҳв–Ҳв•”в•қв–Ҳв–Ҳв•‘  в–Ҳв–Ҳв•‘ в•ҡв–Ҳв–Ҳв–Ҳв–Ҳв•”в•қ в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•—в–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв–Ҳв•‘",
  "в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•қ  в•ҡв•җв•қв•ҡв•җв•җв•җв•җв•җв•қ  в•ҡв•җв•җв•қв•ҡв•җв•җв•қ в•ҡв•җв•қ  в•ҡв•җв•қ  в•ҡв•җв•җв•җв•қ  в•ҡв•җв•җв•җв•җв•җв•җв•қв•ҡв•җв•җв•җв•җв•җв•җв•қ",
];
let bannerRows = bannerLines.length + 1;

// Wave buffers for area below banner
let u=null, uPrev=null, uNext=null;

// Physics tuned for SMALL, LOCAL ripples
let damping = 0.085;        // higher => shorter-lived, less overlap
let c2 = 0.045;             // lower => less spread
let impulseStrength = 0.35; // smaller impulse
let impulseRadius = 0;      // 0 = single cell (clean rings)

// Render thresholds
let lapThr = 0.16;          // threshold on curvature -> thinner fronts
const bg = "#000000";
const bannerColor = "#ffffff";
const waveColor = "#00ffc8";

// Mouse impulse throttling (key to avoid вҖңblobвҖқ)
let lastStamp = 0;
let lastCellX = -999, lastCellY = -999;
const IMPULSE_COOLDOWN_MS = 55; // fewer impulses => less overlap

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;

  ctx.font = `${fontPx}px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace`;
  ctx.textBaseline = "top";

  cellH = Math.round(fontPx * 1.15);
  cellW = Math.round(fontPx * 0.62);

  cols = Math.max(10, Math.floor(W / cellW));
  rows = Math.max(10, Math.floor(H / cellH));

  bannerRows = Math.min(rows - 2, bannerLines.length + 1);
  const simRows = Math.max(1, rows - bannerRows);

  u = new Float32Array(cols * simRows);
  uPrev = new Float32Array(cols * simRows);
  uNext = new Float32Array(cols * simRows);
}
window.addEventListener("resize", resize);
resize();

function addImpulseAtCell(x, ySim){
  const simRows = rows - bannerRows;
  if (x <= 0 || x >= cols-1 || ySim <= 0 || ySim >= simRows-1) return;

  const r = impulseRadius;
  for (let dy=-r; dy<=r; dy++){
    for (let dx=-r; dx<=r; dx++){
      const xx = x + dx, yy = ySim + dy;
      if (xx <= 0 || xx >= cols-1 || yy <= 0 || yy >= simRows-1) continue;
      const d2 = dx*dx + dy*dy;
      const w = (r === 0) ? 1 : Math.exp(-d2 / 1.2);
      u[yy*cols + xx] += impulseStrength * w;
    }
  }
}

// Mouse-over generates tiny ripple, not continuous вҖңpaintingвҖқ
canvas.addEventListener("mousemove", (e) => {
  const now = performance.now();
  if (now - lastStamp < IMPULSE_COOLDOWN_MS) return;
  lastStamp = now;

  const x = Math.floor(e.clientX / cellW);
  const yAll = Math.floor(e.clientY / cellH);
  if (yAll < bannerRows) return;

  const ySim = yAll - bannerRows;

  // Only when entering a NEW cell
  if (x === lastCellX && ySim === lastCellY) return;
  lastCellX = x; lastCellY = ySim;

  addImpulseAtCell(x, ySim);
});

// Wave equation step
function stepSim(){
  const simRows = rows - bannerRows;
  if (simRows <= 0) return;

  for (let y=0; y<simRows; y++){
    for (let x=0; x<cols; x++){
      const i = y*cols + x;

      // fixed boundaries (pinned)
      if (x===0 || x===cols-1 || y===0 || y===simRows-1){
        uNext[i] = 0;
        continue;
      }

      const center = u[i];
      const lap = (u[i-cols] + u[i+cols] + u[i-1] + u[i+1] - 4*center);

      uNext[i] =
        (2 - damping) * center -
        (1 - damping) * uPrev[i] +
        c2 * lap;
    }
  }

  const tmp = uPrev; uPrev = u; u = uNext; uNext = tmp;
}

function render(){
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Banner
  ctx.fillStyle = bannerColor;
  const startX = Math.max(0, Math.floor((cols - bannerLines[0].length) / 2));
  for (let i=0; i<Math.min(bannerLines.length, bannerRows-1); i++){
    ctx.fillText(bannerLines[i], startX * cellW, i * cellH);
  }

  // Waves: render by CURVATURE (Laplacian) -> shows thin fronts (rings)
  ctx.fillStyle = waveColor;
  const simRows = rows - bannerRows;

  for (let y=0; y<simRows; y++){
    const yPix = (y + bannerRows) * cellH;
    for (let x=0; x<cols; x++){
      const i = y*cols + x;

      // compute laplacian for rendering too (skip edges)
      let lap = 0;
      if (x>0 && x<cols-1 && y>0 && y<simRows-1){
        const center = u[i];
        lap = (u[i-cols] + u[i+cols] + u[i-1] + u[i+1] - 4*center);
      }

      const ch = (Math.abs(lap) > lapThr) ? "-" : "~";
      ctx.fillText(ch, x * cellW, yPix);
    }
  }
}

let last = performance.now();
function loop(t){
  const dt = Math.min(50, t - last);
  last = t;

  // calmer sim
  const substeps = Math.max(1, Math.floor(dt / 24));
  for (let i=0; i<substeps; i++) stepSim();

  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
